<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR.js GPS Demo</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/three.js/build/ar-threex-location-only.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
    <script defer src="./src/ar.js"></script>
  </head>
  <body>
    <div class="ar-instructions">
      <h1>AR Spike Run</h1>
      <p>Разреши доступ к камере и геолокации. В AR используется та же машина, что и в desktop-версии.</p>
      <p id="ar-status">Ожидание GPS...</p>
    </div>

    <a-scene
      vr-mode-ui="enabled: false"
      renderer="antialias: true; alpha: true"
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false">
      <a-assets>
        <a-asset-item id="centerpiece-model" src="./assets/models/centerpiece.glb"></a-asset-item>
      </a-assets>

      <a-camera gps-new-camera="gpsMinDistance: 5"></a-camera>

      <a-entity gps-new-entity-place="latitude: 55.751244; longitude: 37.618423" position="0 2 0">
        <a-entity gltf-model="#centerpiece-model" position="0 0 0" rotation="0 180 0" scale="0.5 0.5 0.5"></a-entity>
        <a-text value="Player Car" align="center" position="0 6 0" scale="20 20 20" color="#ffffff"></a-text>
      </a-entity>

      <a-entity gps-new-entity-place="latitude: 55.751844; longitude: 37.617823" position="0 2 0">
        <a-cone color="#ff7c70" radius-bottom="4" radius-top="0.8" height="10"></a-cone>
        <a-text value="Hazard Marker" align="center" position="0 8 0" scale="24 24 24" color="#fff5d6"></a-text>
      </a-entity>
    </a-scene>
  </body>
</html>
