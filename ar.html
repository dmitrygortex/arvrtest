<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR.js GPS Demo</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/three.js/build/ar-threex-location-only.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
    <script defer src="./src/ar.js"></script>
  </head>
  <body>
    <div class="ar-instructions">
      <h1>AR Spike Run</h1>
      <p>Разреши доступ к камере и геолокации. После GPS lock трасса появится перед тобой ниже уровня камеры.</p>
      <p id="ar-status">Ожидание GPS...</p>
      <p>Score: <span id="ar-score-value">0</span> | Time: <span id="ar-time-value">0.0</span></p>
    </div>

    <div id="ar-overlay" class="overlay">
      <div class="overlay-card ar-overlay-card">
        <h2 id="ar-overlay-title">AR Spike Run</h2>
        <p id="ar-overlay-text">Нажми Start после GPS lock и уворачивайся от шипов.</p>
        <button id="ar-restart-button" type="button">Play Again</button>
      </div>
    </div>

    <div class="ar-controls">
      <button id="ar-left-button" type="button">Left</button>
      <button id="ar-start-button" type="button">Start</button>
      <button id="ar-right-button" type="button">Right</button>
    </div>

    <a-scene
      vr-mode-ui="enabled: false"
      renderer="antialias: true; alpha: true"
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false">
      <a-assets>
        <a-asset-item id="centerpiece-model" src="./assets/models/centerpiece.glb"></a-asset-item>
      </a-assets>

      <a-camera gps-new-camera="gpsMinDistance: 5"></a-camera>
    </a-scene>
  </body>
</html>
